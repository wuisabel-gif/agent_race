name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow running the workflow manually from the Actions tab.
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade "ruff>=0.6"
      - name: Ruff lint
        run: ruff check src tests harness
      - name: Ruff format check
        run: ruff format --check src tests harness

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev + token extras
        run: |
          python -m pip install --upgrade pip
          # tokens extra exercises the tiktoken code path in tokens.py.
          # (dashboard/streamlit is omitted: heavy and not covered by tests.)
          python -m pip install -e ".[dev,tokens]"
      - name: Run tests
        run: pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and check distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/tokenomist-wheel
          /tmp/tokenomist-wheel/bin/python -m pip install dist/tokenomist-*.whl
          /tmp/tokenomist-wheel/bin/tokenomist formats
