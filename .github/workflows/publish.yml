name: Publish to PyPI

# Publishes a release to PyPI when you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored in the repo.
# One-time setup on PyPI is required (see PHASE3_NOTES.md).
on:
  release:
    types: [published]
  # Lets you dry-run the build (build job only) without publishing.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          # Fail early if metadata is malformed.
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    # Only publish for an actual release event, not manual dry-runs.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tokenomist/
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
